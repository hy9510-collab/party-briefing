name: 매일 브리핑 자동 갱신

on:
  schedule:
    # 매일 오전 7시 30분 KST (= 전날 22:30 UTC)
    - cron: "30 22 * * *"
  workflow_dispatch:   # 수동 실행 버튼도 제공

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 파일 커밋에 필요

    steps:
      - name: 코드 내려받기
        uses: actions/checkout@v4

      - name: Python 의존성 설치
        run: pip install requests beautifulsoup4

      - name: 게시판 스크래핑 & md 갱신
        run: python scraper/update_briefing.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add 정당정책_오늘내용.md
          # 변경이 없으면 커밋하지 않음
          git diff --cached --quiet || git commit -m "auto: $(date +'%Y-%m-%d') 브리핑 갱신"
          git push
